<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        label{
            display: block;
        }
      .form-group{
        margin: 20px;
      }

      .input-border{
        border-radius: 6px;
        border-color: black;
        
        
      }

      .input-border:hover{
        transform: scale(1.3);
      }
    </style>
</head>
<body>
    
    <h1>Welcome back</h1>
    
    <form action="">
        <!--EMAILS-->
        <div class="form-group">
            <label for="email">Enter your name</label>
            <br>
            <input type="email" required name="" id="email" class="input-border">
        </div>
        

        <!--PASSWORD-->
        <div class="form-group">
        <label for="password">Enter your password</label>
        <br>
        <input type="password" required ="" id="password" class="input-border">
        </div>

        <!--SUBMISSION-->
        <div class="form-group">
        <input type="submit" value="Submit" class="input-border">
        </div>
</body>
</html>
