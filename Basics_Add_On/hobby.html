<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gaming - My hobby</title>

    <style>
       

       h1{
         text-align: center;
       }

       h2{
        text-align: center;
       }
        body{
          background: radial-gradient(circle at 7.5% 24%, rgb(237, 161, 193) 0%, rgb(250, 178, 172) 25.5%, rgb(190, 228, 210) 62.3%, rgb(215, 248, 247) 93.8%);
        }

        img {
            max-width: 100%;
           
        }

        p {
            font-size: 18px;
            line-height: 1.5;
          
            
        }

        button {
            display: block;
            margin: 0 auto;
            border: 2.5px solid violet;
            background:rgb(190, 228, 210);
            font-size: 20px;
            border-radius: 15px;
            padding: 10px 15px;
            transition:  all 150ms ease-in-out;
        }

        button:hover{
            background: plum;
            cursor: pointer;
        
        }

        footer {
            text-align: center;
            margin: 1px 0;
            font-size: 18px;
        }

        .container {
            width:600px;
            max-width: 600px;
            margin:5px auto;
            background: #F9D0CD;
          display: block;
            padding:50px ;
            border-radius: 10px;
        }
        

        .theme-button {
            font-size: 12px;
            background-color: black;
            color: white;
            padding: 5 8px ;
        }

        .theme-button:hover {
            color: black;
            background-color: white;
            cursor: pointer;
        }

        .video-game-intro-picture {
            display: block;
            margin-left: auto;
            width: 300px;
            margin-right: auto;
            border-radius: 10px;
            transition: transform 150ms ease-in-out, filter 200ms ease-in-out ;
        }

        .video-game-intro-picture:hover {
            filter: contrast(80%);
            transform: scale(1.2);
        }       
        
        .grid {
            margin:  20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-gap: 15px

        }

        .grid img {
            width: 100%;
            border-radius: 8px;
           
        }

        .grid img:hover{
            transform: scale(1.2) ;
        }
        .dark{
            background: #4E220F;
            color: #F7F1DE;
        }
       .dark .container {
        background:rgb(247, 241, 222, 0.2);
       }

       .dark a{
        color: pink ;
       }
        
    </style>
</head>

        //     if (body.classList.contains("dark")) {
