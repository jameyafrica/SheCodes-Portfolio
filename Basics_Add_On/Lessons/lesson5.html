<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=
  , initial-scale=1.0" />

    <title>Class Manipulation</title>

    <style>
    
    body{
        background-color: white;
        color: black;
    }

    button {
        background-color: black;
        color: white;
        cursor: pointer;
    
    }

    body.dark{
        background-color:black;
        color: white;
    }

  body.dark button {
            background-color: white;
            color: black;
            border: 2px solid white;
        }


   
    </style>
</head>

<body>
  <div>
<button>Dark theme</button>
</div>

<script>
function makeItDark() {
    let myBody = document.querySelector("body");
    myBody.classList.add("dark");
}
    let button = document.querySelector("button");
    button.addEventListener("click", makeItDark);

</script>
</body>

</html>
